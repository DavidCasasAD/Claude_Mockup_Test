<style>
* { box-sizing:border-box; margin:0; padding:0; user-select:none; }
body { background:#7dd8f0; font-family:sans-serif; }
#app { display:flex; gap:16px; padding:16px; align-items:flex-start; }
#toolbar { display:flex; gap:8px; margin-bottom:10px; }
button { font-size:12px; padding:7px 14px; border-radius:8px; border:none; cursor:pointer; font-weight:600; }
#btn-clear  { background:#fff; color:#333; }
#btn-export { background:#2ecc71; color:#fff; }
#board-wrap { position:relative; display:inline-block; line-height:0; }
#board-img  { display:block; width:420px; }
#palette { width:155px; flex-shrink:0; background:rgba(255,255,255,0.9); border-radius:14px; padding:12px; }
#palette h2 { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; color:#444; margin-bottom:10px; }
.pal-label { font-size:10px; color:#888; margin-bottom:6px; font-weight:600; }
#color-row { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px; align-items:center; }
#type-row  { display:flex; gap:4px; margin-bottom:10px; }
#piece-preview { display:inline-block; cursor:grab; border:2px solid transparent; border-radius:8px; padding:2px; margin-bottom:8px; transition:border-color .15s; }
#piece-preview:hover { border-color:#f5a623; }
#piece-preview img { display:block; pointer-events:none; }
#hint { font-size:10px; color:#999; line-height:1.6; }
</style>

const COLOR_ORDER  = ["yellow", "red", "pink", "blue", "lightblue", "green"];
const COLOR_HEX    = {"yellow": "#F5C518", "red": "#E03040", "pink": "#E060A0", "blue": "#2A3BD5", "lightblue": "#30B8F0", "green": "#22C040"};

const DISP_W  = 420;
const ROW_Y   = [141.9, 187.3, 233.4, 279.6, 325.8, 372.1, 418.3];
const COL_X   = [48.6, 94.0, 140.2, 185.6, 231.7, 277.9, 324.1];
const CELL_W  = 45.85;
const CELL_H  = 45.82;
const PIECE_W = 48;
const PIECE_H = 53.3;
const OFFSET_Y = -2;

let selColor = 'yellow';
let selType  = 'bubble';
let dragging = false;
let ghostEl  = null;
const placed = {};

function getScale() {
  return document.getElementById('board-img').offsetWidth / DISP_W;
}
function cellKey(r,c){ return r+','+c; }
function getSrc(type, color) {
  return type === 'bubble' ? BUBBLE[color] : SIMPLE[color];
}

function setColor(name) {
  selColor = name;
  document.querySelectorAll('.cdot').forEach(d => {
    const isSelected = d.dataset.color === name;
    d.style.boxShadow = isSelected ? '0 0 0 3px #fff, 0 0 0 5px ' + COLOR_HEX[name] : 'none';
    d.style.transform = isSelected ? 'scale(1.15)' : 'scale(1)';
  });
  updatePreview();
}

function setType(type) {
  selType = type;
  document.querySelectorAll('.type-btn').forEach(b => {
    const active = b.dataset.type === type;
    b.style.background  = active ? 'rgba(0,0,0,0.1)' : 'transparent';
    b.style.fontWeight  = active ? '700' : '500';
    b.style.color       = active ? '#222' : '#777';
  });
  updatePreview();
}

function updatePreview() {
  document.querySelector('#piece-preview img').src = getSrc(selType, selColor);
}

function buildPalette() {
  const row = document.getElementById('color-row');
  row.innerHTML = '';
  COLOR_ORDER.forEach(name => {
    const d = document.createElement('div');
    d.className = 'cdot';
    d.dataset.color = name;
    const hex = COLOR_HEX[name];
    const isSelected = name === selColor;
    d.style.cssText = [
      'width:26px',
      'height:26px',
      'border-radius:50%',
      'cursor:pointer',
      'flex-shrink:0',
      'transition:transform .12s, box-shadow .12s',
      'background-color:' + hex,
      'box-shadow:' + (isSelected ? '0 0 0 3px #fff, 0 0 0 5px '+hex : 'none'),
      'transform:' + (isSelected ? 'scale(1.15)' : 'scale(1)'),
    ].join(';');
    d.onclick = () => setColor(name);
    row.appendChild(d);
  });

  const typeRow = document.getElementById('type-row');
  typeRow.innerHTML = '';
  [['bubble','Marble Box'],['simple','Locked Box']].forEach(([type,label]) => {
    const b = document.createElement('div');
    b.className = 'type-btn';
    b.dataset.type = type;
    b.textContent = label;
    const active = type === selType;
    b.style.cssText = [
      'font-size:11px',
      'padding:4px 10px',
      'border-radius:6px',
      'cursor:pointer',
      'background:' + (active ? 'rgba(0,0,0,0.1)' : 'transparent'),
      'color:' + (active ? '#222' : '#777'),
      'font-weight:' + (active ? '700' : '500'),
      'transition:background .15s',
    ].join(';');
    b.onclick = () => setType(type);
    typeRow.appendChild(b);
  });
}

function placePiece(r,c) {
  const key = cellKey(r,c);
  if (placed[key]) { removePiece(key); return; }
  const s  = getScale();
  const px = (COL_X[c] - (PIECE_W - CELL_W) / 2) * s;
  const py = (ROW_Y[r] + OFFSET_Y) * s;
  const pw = PIECE_W * s;
  const ph = PIECE_H * s;
  const el = document.createElement('div');
  el.style.cssText = 'position:absolute;left:'+px+'px;top:'+py+'px;width:'+pw+'px;height:'+ph+'px;z-index:'+(200+r*10)+';pointer-events:all;cursor:pointer;';
  const img = document.createElement('img');
  img.src = getSrc(selType, selColor);
  img.draggable = false;
  img.style.cssText = 'width:100%;height:100%;object-fit:fill;display:block;pointer-events:none;';
  el.appendChild(img);
  el.onclick = () => removePiece(key);
  document.getElementById('board-wrap').appendChild(el);
  placed[key] = { el, r, c };
}

function removePiece(key) {
  if (!placed[key]) return;
  placed[key].el.remove();
  delete placed[key];
}
function clearBoard() { Object.keys(placed).forEach(k => removePiece(k)); }

function moveGhost(x,y) {
  if (ghostEl) { ghostEl.style.left = x+'px'; ghostEl.style.top = y+'px'; }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('board-img').src = BOARD_SRC;
  buildPalette();

  document.getElementById('piece-preview').addEventListener('mousedown', e => {
    ghostEl = document.createElement('img');
    ghostEl.src = getSrc(selType, selColor);
    ghostEl.style.cssText = 'position:fixed;pointer-events:none;z-index:9999;width:60px;height:66px;object-fit:contain;opacity:0.9;transform:translate(-50%,-50%)';
    document.body.appendChild(ghostEl);
    moveGhost(e.clientX, e.clientY);
    dragging = true;
    e.preventDefault();
  });

  document.addEventListener('mousemove', e => { if (dragging) moveGhost(e.clientX, e.clientY); });

  document.addEventListener('mouseup', e => {
    if (!dragging) return;
    dragging = false;
    if (ghostEl) { ghostEl.remove(); ghostEl = null; }
    const rect = document.getElementById('board-img').getBoundingClientRect();
    const s  = getScale();
    const lx = (e.clientX - rect.left) / s;
    const ly = (e.clientY - rect.top)  / s;
    let col = -1, row = -1;
    for (let c=0; c<COL_X.length; c++) if (lx >= COL_X[c] && lx < COL_X[c]+CELL_W) { col=c; break; }
    for (let r=0; r<ROW_Y.length; r++) if (ly >= ROW_Y[r] && ly < ROW_Y[r]+CELL_H) { row=r; break; }
    if (col >= 0 && row >= 0) placePiece(row, col);
  });

  document.getElementById('btn-clear').onclick  = clearBoard;
  document.getElementById('btn-export').onclick = () => {
    html2canvas(document.getElementById('board-wrap'), {
      scale:2, useCORS:true, allowTaint:true, backgroundColor:null
    }).then(canvas => {
      const a = document.createElement('a');
      a.download = 'puzzle-mockup.png';
      a.href = canvas.toDataURL('image/png');
      a.click();
    });
  };
});
</script>
